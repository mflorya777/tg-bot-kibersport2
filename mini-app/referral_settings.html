<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Настройки рефералки - Kibersport</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d1b2a 100%);
            background-attachment: fixed;
            color: var(--tg-theme-text-color, #ffffff);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-item:last-child {
            margin-bottom: 0;
        }

        .setting-label {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .setting-description {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #b0b0b0);
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-label {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #b0b0b0);
            margin-bottom: 5px;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-size: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .input-field:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
        }

        .select-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-size: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        .select-field:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
        }

        .select-field option {
            background: #1a1a3e;
            color: #ffffff;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .button:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .button-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .button-success {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #b0b0b0);
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #ff3333;
        }

        .success {
            text-align: center;
            padding: 20px;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.4);
            border-radius: 8px;
            color: #4caf50;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Настройки рефералки</h1>
        </div>

        <div id="success" class="success">✅ Настройки успешно сохранены!</div>
        <div id="loading" class="loading">Загрузка настроек...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="content" style="display: none;">
            <form id="referral-settings-form">
                <div class="card">
                    <div class="setting-item">
                        <div class="setting-label">💰 Бонус за приглашённого</div>
                        <div class="setting-description">Сколько CD токенов начисляется за каждого приглашённого друга</div>
                        <div class="input-group">
                            <input 
                                type="number" 
                                id="bonus-per-referral" 
                                class="input-field" 
                                min="0" 
                                step="1" 
                                required
                                placeholder="50"
                            />
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="setting-item">
                        <div class="setting-label">✅ Условие засчитывания</div>
                        <div class="setting-description">Когда считаем приглашение засчитанным</div>
                        <div class="input-group">
                            <select id="referral-condition" class="select-field" required>
                                <option value="registration">Когда друг зарегистрировался</option>
                                <option value="tournament">Когда друг сыграл 1 турнир</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="setting-item">
                        <div class="setting-label">🛡️ Защита от накрутки</div>
                        <div class="setting-description">Правило для предотвращения накрутки рефералов</div>
                        <div class="input-group">
                            <select id="anti-fraud-rule" class="select-field" required>
                                <option value="one_account_one_device">1 аккаунт = 1 устройство</option>
                                <option value="one_account_one_number">1 аккаунт = 1 номер телефона</option>
                                <option value="one_account_one_device_number">1 аккаунт = 1 устройство и 1 номер</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="button button-success">💾 Сохранить настройки</button>
                <button type="button" class="button button-secondary" onclick="resetForm()">🔄 Сбросить</button>
            </form>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Получение данных пользователя из Telegram
        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id;

        // Загрузка настроек
        async function loadSettings() {
            try {
                // Здесь можно добавить запрос к API бота для получения данных
                // Пока используем тестовые данные
                const settingsData = {
                    bonus_per_referral: 50,
                    referral_condition: "registration",
                    anti_fraud_rule: "one_account_one_device",
                };

                displaySettings(settingsData);
            } catch (error) {
                console.error('Ошибка загрузки настроек:', error);
                showError('Не удалось загрузить настройки');
            }
        }

        // Отображение настроек
        function displaySettings(settings) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            document.getElementById('bonus-per-referral').value = settings.bonus_per_referral || 50;
            document.getElementById('referral-condition').value = settings.referral_condition || 'registration';
            document.getElementById('anti-fraud-rule').value = settings.anti_fraud_rule || 'one_account_one_device';
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = message;
        }

        // Обработка отправки формы
        document.getElementById('referral-settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const settings = {
                bonus_per_referral: parseInt(document.getElementById('bonus-per-referral').value),
                referral_condition: document.getElementById('referral-condition').value,
                anti_fraud_rule: document.getElementById('anti-fraud-rule').value,
            };

            try {
                // Здесь должен быть запрос к API бота для сохранения настроек
                // Пока показываем успешное сообщение
                tg.showAlert('Настройки успешно сохранены!');
                
                // Показываем сообщение об успехе
                const successDiv = document.getElementById('success');
                successDiv.style.display = 'block';
                setTimeout(() => {
                    successDiv.style.display = 'none';
                }, 3000);
            } catch (error) {
                console.error('Ошибка сохранения настроек:', error);
                tg.showAlert('Ошибка при сохранении настроек');
            }
        });

        // Сброс формы
        function resetForm() {
            tg.showConfirm(
                'Сбросить все изменения?',
                (confirmed) => {
                    if (confirmed) {
                        loadSettings();
                    }
                }
            );
        }

        // Загружаем настройки при загрузке страницы
        loadSettings();
    </script>
</body>
</html>
