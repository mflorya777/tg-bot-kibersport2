<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- URL API сервера -->
    <meta name="api-base-url" content="https://test-all-blabla.ru">
    <title>Акции и розыгрыши - Kibersport</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d1b2a 100%);
            background-attachment: fixed;
            color: var(--tg-theme-text-color, #ffffff);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .promotion-card {
            margin-bottom: 20px;
        }

        .promotion-card:last-child {
            margin-bottom: 0;
        }

        .promotion-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .promotion-info {
            margin-bottom: 15px;
        }

        .promotion-info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .promotion-info-item:last-child {
            border-bottom: none;
        }

        .promotion-label {
            color: var(--tg-theme-hint-color, #b0b0b0);
            font-size: 14px;
        }

        .promotion-value {
            color: #ffffff;
            font-size: 14px;
            text-align: right;
            font-weight: 500;
        }

        .promotion-description {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            margin: 15px 0;
            color: #ffffff;
            font-size: 14px;
            line-height: 1.5;
        }

        .ticket-info {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }

        .ticket-count {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
            text-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .ticket-label {
            color: var(--tg-theme-hint-color, #b0b0b0);
            font-size: 12px;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .button:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .button-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .button-disabled {
            background: rgba(128, 128, 128, 0.3);
            color: rgba(255, 255, 255, 0.5);
            cursor: not-allowed;
        }

        .button-disabled:active {
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #b0b0b0);
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #ff3333;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #b0b0b0);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .status-active {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .status-completed {
            background: rgba(158, 158, 158, 0.3);
            color: #9e9e9e;
            border: 1px solid rgba(158, 158, 158, 0.5);
        }

        .winners-section {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .winners-title {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .winner-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            color: #ffffff;
        }

        .winner-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 Акции и розыгрыши</h1>
        </div>

        <div id="loading" class="loading">Загрузка розыгрышей...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="content" style="display: none;"></div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Получение данных пользователя из Telegram
        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id;

        // Загрузка розыгрышей
        async function loadPromotions() {
            try {
                // По умолчанию мини-апп ходит в API на сервере, а не на Vercel-origin.
                let apiBaseUrl = window.API_BASE_URL || 'https://test-all-blabla.ru';
                const apiUrl = `${apiBaseUrl}/api/promotions/${userId}`;
                
                // Получаем initData для проверки подлинности (опционально)
                const initData = tg.initData || '';
                
                // Запрос к API
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Init-Data': initData,
                    },
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Логируем полученные данные для отладки
                console.log('Данные розыгрышей из API:', data);
                
                displayPromotions(data.promotions || []);
            } catch (error) {
                console.error('Ошибка загрузки розыгрышей:', error);
                showError('Не удалось загрузить розыгрыши. Попробуйте позже.');
            }
        }

        // Отображение розыгрышей
        function displayPromotions(promotions) {
            document.getElementById('loading').style.display = 'none';
            const contentDiv = document.getElementById('content');
            contentDiv.style.display = 'block';

            if (!promotions || promotions.length === 0) {
                contentDiv.innerHTML = '<div class="empty-state">Активных розыгрышей пока нет</div>';
                return;
            }

            let html = '';
            promotions.forEach(promotion => {
                html += createPromotionCard(promotion);
            });

            contentDiv.innerHTML = html;
        }

        // Создание карточки розыгрыша
        function createPromotionCard(promotion) {
            const now = new Date();
            const endDate = new Date(promotion.end_date);
            const isActive = promotion.status === 'active' && endDate > now;
            const isCompleted = promotion.status === 'completed' || endDate <= now;

            let html = `<div class="card promotion-card">`;
            
            // Статус
            if (isActive) {
                html += `<span class="status-badge status-active">🟢 Активен</span>`;
            } else if (isCompleted) {
                html += `<span class="status-badge status-completed">🏁 Завершен</span>`;
            }

            // Название
            html += `<div class="promotion-title">${promotion.name}</div>`;

            // Описание
            if (promotion.description) {
                html += `<div class="promotion-description">${promotion.description}</div>`;
            }

            // Информация
            html += `<div class="promotion-info">`;
            
            // До какого числа
            const endDateStr = formatDate(promotion.end_date);
            html += `<div class="promotion-info-item">
                <span class="promotion-label">📅 До:</span>
                <span class="promotion-value">${endDateStr}</span>
            </div>`;

            // Условия участия
            if (promotion.participation_type === 'tokens') {
                html += `<div class="promotion-info-item">
                    <span class="promotion-label">🎫 Условие:</span>
                    <span class="promotion-value">1 билет = ${promotion.ticket_cost} CD токенов</span>
                </div>`;
            } else {
                html += `<div class="promotion-info-item">
                    <span class="promotion-label">✅ Условие:</span>
                    <span class="promotion-value">${promotion.condition_description || 'Выполнить условие'}</span>
                </div>`;
            }

            // Лимит билетов
            if (promotion.ticket_limit_per_user) {
                html += `<div class="promotion-info-item">
                    <span class="promotion-label">📊 Лимит:</span>
                    <span class="promotion-value">${promotion.ticket_limit_per_user} билетов на человека</span>
                </div>`;
            }

            html += `</div>`;

            // Информация о билетах пользователя (только для активных)
            if (isActive && promotion.participation_type === 'tokens') {
                const userTickets = promotion.user_tickets || 0;
                html += `<div class="ticket-info">
                    <div class="ticket-count">${userTickets}</div>
                    <div class="ticket-label">У тебя билетов</div>
                </div>`;
            }

            // Победители (только для завершенных)
            if (isCompleted && promotion.winners && promotion.winners.length > 0) {
                html += `<div class="winners-section">
                    <div class="winners-title">🏆 Победители:</div>`;
                promotion.winners.forEach((winner, index) => {
                    html += `<div class="winner-item">${index + 1}. ${winner.name || `ID: ${winner.id}`}</div>`;
                });
                html += `</div>`;
            }

            // Кнопки
            html += `<div class="promotion-actions">`;
            
            if (isActive) {
                if (promotion.participation_type === 'tokens') {
                    const canBuyMore = !promotion.ticket_limit_per_user || 
                                      (promotion.user_tickets || 0) < promotion.ticket_limit_per_user;
                    if (canBuyMore) {
                        html += `<button class="button" onclick="buyTicket('${promotion.id}', ${promotion.ticket_cost})">
                            🎫 Получить билет (${promotion.ticket_cost} CD токенов)
                        </button>`;
                    } else {
                        html += `<button class="button button-disabled" disabled>
                            🎫 Достигнут лимит билетов
                        </button>`;
                    }
                } else {
                    html += `<button class="button" onclick="participate('${promotion.id}')">
                        ✅ Участвовать
                    </button>`;
                }
                
                html += `<button class="button button-secondary" onclick="showConditions('${promotion.id}')">
                    📋 Условия
                </button>`;
            } else if (isCompleted) {
                html += `<button class="button button-secondary" onclick="showResults('${promotion.id}')">
                    🏁 Результаты
                </button>`;
            }

            html += `</div>`;
            html += `</div>`;

            return html;
        }

        // Форматирование даты
        function formatDate(dateString) {
            const date = new Date(dateString);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${day}.${month}.${year} ${hours}:${minutes}`;
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = message;
        }

        // Покупка билета
        async function buyTicket(promotionId, cost) {
            tg.showConfirm(
                `Купить билет за ${cost} CD токенов?`,
                async (confirmed) => {
                    if (confirmed) {
                        try {
                            // Определяем URL API
                            let apiBaseUrl = window.API_BASE_URL || 'https://test-all-blabla.ru';
                            const apiUrl = `${apiBaseUrl}/api/promotions/${userId}/buy-ticket`;
                            
                            // Получаем initData для проверки подлинности (опционально)
                            const initData = tg.initData || '';
                            
                            // Запрос к API
                            const response = await fetch(apiUrl, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'X-Init-Data': initData,
                                },
                                body: JSON.stringify({
                                    giveaway_id: promotionId,
                                }),
                            });
                            
                            if (!response.ok) {
                                const errorData = await response.json();
                                throw new Error(errorData.detail || 'Ошибка при покупке билета');
                            }
                            
                            const data = await response.json();
                            
                            tg.showAlert(data.message || 'Билет успешно приобретен!');
                            
                            // Перезагружаем данные
                            loadPromotions();
                        } catch (error) {
                            console.error('Ошибка покупки билета:', error);
                            tg.showAlert(error.message || 'Не удалось купить билет. Попробуйте позже.');
                        }
                    }
                }
            );
        }

        // Участие в розыгрыше (для условий)
        function participate(promotionId) {
            tg.showAlert('Для участия выполните условие розыгрыша');
        }

        // Показать условия
        function showConditions(promotionId) {
            // Здесь можно показать подробные условия
            tg.showAlert('Подробные условия розыгрыша будут доступны в следующей версии');
        }

        // Показать результаты
        function showResults(promotionId) {
            // Результаты уже отображаются в карточке, но можно показать подробнее
            tg.showAlert('Результаты отображаются в карточке розыгрыша');
        }

        // Загружаем розыгрыши при загрузке страницы
        loadPromotions();
    </script>
</body>
</html>
